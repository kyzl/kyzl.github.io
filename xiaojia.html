<script>
	var div_timer = document.getElementById("div_timer");
	let setTime = function(){
		let date = new Date();
		let month = date.getMonth()+1;
		if(month< 10) {month = '0'+month;}
		let day = date.getDate();
		if(day < 10){day = '0'+day;}
		let hour = date.getHours();
		if(hour<10) hour = '0'+hour;
		let minutes = date.getMinutes();
		if(minutes<10){minutes = '0'+minutes;}
		let sec = date.getSeconds();
		if(sec < 10 ){sec = '0'+sec;}
		
		div_timer.innerText = month+'-'+day+' '+hour+':'+minutes+':'+sec;
	}
	
	setInterval(setTime,1000);
	
	var div_yxsj = document.getElementById("div_yxsj");
	let date = new Date();
	let month = date.getMonth()+1;
	if(month< 10) {month = '0'+month;}
	let day = date.getDate();
	if(day < 10){day = '0'+day;}
	div_yxsj.innerText="有效时间: 2022-"+month+'-'+(Number(day)-1)+' 11:00至'+"2022-"+month+'-'+day+' '+'22:45';
	
</script>
